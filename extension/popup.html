<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 230px;
      padding: 18px 16px 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e8e8e8;
    }
    h3 {
      font-size: 15px;
      font-weight: 600;
      color: #7eb8f7;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    #solveBtn {
      width: 100%;
      padding: 10px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
    }
    #solveBtn:hover  { background: #2980b9; }
    #solveBtn:active { background: #1f6391; }
    #status {
      margin-top: 13px;
      font-size: 13px;
      min-height: 18px;
      line-height: 1.4;
      word-break: break-all;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h3>BreakCAPTCHA</h3>
  <button id="solveBtn">Solve CAPTCHA</button>
  <div id="status"></div>
  <script src="lib/tf-core.min.js"></script>
  <script src="lib/tf-layers.min.js"></script>
  <script src="lib/tf-backend-cpu.min.js"></script>
  <script src="preprocessing.js"></script>
  <script src="solver.js"></script>
  <script src="popup.js"></script>
</body>
</html>
